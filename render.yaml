services:
  - type: web
    name: primewear-catalogo
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: primewear-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: STORAGE_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN_SECRET
        sync: false
